<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureCloud</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            card: '#1e293b',
                            light: '#38bdf8',
                            glow: '#0ea5e9'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-font-smoothing: antialiased; }
        .bg-grid {
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .animate-blob { animation: blob 7s infinite; }
        @keyframes blob {
            0% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-50px) scale(1.1); }
            66% { transform: translate(-20px,20px) scale(0.9); }
            100% { transform: translate(0,0) scale(1); }
        }
    </style>
</head>

<body class="bg-brand-dark text-white font-sans bg-grid flex items-center justify-center min-h-screen relative">

<!-- Glow Background -->
<div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-[-20%] right-[-10%] w-96 h-96 bg-brand-glow rounded-full blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute bottom-[-20%] left-[-10%] w-80 h-80 bg-brand-light rounded-full blur-3xl opacity-20 animate-blob"></div>
</div>

<div class="container mx-auto px-4 relative z-10 w-full max-w-6xl">
<div class="bg-brand-card/60 backdrop-blur-2xl border border-white/10 rounded-3xl overflow-hidden flex">

<!-- LEFT -->
<div class="w-full md:w-1/2 p-10">

<a href="{{ url_for('home') }}" class="flex items-center gap-2 text-brand-light mb-8">
    <i class="fas fa-arrow-left"></i> Back to Home
</a>

<h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
<p class="text-gray-400 mb-6">Enter your credentials to access your secure vault.</p>

<!-- 🔔 ALERT / FLASH MESSAGES -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="space-y-3 mb-6">
{% for category, message in messages %}
<div class="
    px-4 py-3 rounded-xl text-sm font-medium border flex items-center gap-3
    {% if category == 'error' %}
        bg-red-500/10 border-red-500/30 text-red-300
    {% elif category == 'success' %}
        bg-green-500/10 border-green-500/30 text-green-300
    {% elif category == 'warning' %}
        bg-yellow-500/10 border-yellow-500/30 text-yellow-300
    {% else %}
        bg-brand-light/10 border-brand-light/30 text-brand-light
    {% endif %}
">
<i class="fas
    {% if category == 'error' %}fa-circle-xmark
    {% elif category == 'success' %}fa-circle-check
    {% elif category == 'warning' %}fa-triangle-exclamation
    {% else %}fa-circle-info{% endif %}
"></i>
<span>{{ message }}</span>
</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}
<!-- 🔔 END ALERTS -->

<form method="POST" action="{{ url_for('login') }}" class="space-y-5">

<!-- Username -->
<div>
<label class="text-sm text-gray-300">Email or Username</label>
<div class="relative mt-1">
<i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
<input name="username" required
class="w-full bg-brand-dark/60 border border-brand-light/30 rounded-xl py-3 pl-10 focus:ring-2 focus:ring-brand-glow outline-none">
</div>
</div>

<!-- Password -->
<div>
<label class="text-sm text-gray-300">Password</label>
<div class="relative mt-1">
<i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
<input type="password" name="password" required
class="w-full bg-brand-dark/60 border border-brand-light/30 rounded-xl py-3 pl-10 focus:ring-2 focus:ring-brand-glow outline-none">
</div>
</div>

<!-- 2FA -->
<div>
<label class="text-sm text-gray-300">2FA Code (optional)</label>
<div class="relative mt-1">
<i class="fas fa-shield-halved absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
<input name="totp_code"
class="w-full bg-brand-dark/60 border border-brand-light/30 rounded-xl py-3 pl-10 focus:ring-2 focus:ring-brand-glow outline-none">
</div>
</div>

<button class="w-full mt-4 bg-gradient-to-r from-brand-light to-brand-glow py-4 rounded-xl font-bold hover:-translate-y-1 transition">
Access Dashboard <i class="fas fa-arrow-right ml-2"></i>
</button>

</form>

</div>

<!-- RIGHT VISUAL -->
<div class="hidden md:flex w-1/2 items-center justify-center bg-gradient-to-br from-brand-dark to-brand-card">
<i class="fas fa-server text-7xl text-brand-light opacity-40"></i>
</div>

</div>
</div>

</body>
</html>
